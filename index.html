<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Pot</title>
</head>
<body>
    <section class="linkrow">
        <p class="placeholder">PLACEHOLDER</p>
    </section>
    <section class="hero-image">
        <div class="hero-text">
            <h1>The Stemay Wok</h1>
            <p>A Hot Pot Studios Experience</p>
        </div>
    </section>
    <section class="content">
        <section class="row1">
            <div class="overlap-card">
                <div class="text-overlay">
                    <p>"If you're hungry, eat!" - Monkey D Luffy</p>
                </div>
                <img class="base-image" src="./Images/Luffy-Plate.png" alt="White and Black Plate">
            </div>
            <div class="oden-card">
                <div class="image-card">
                    <img src="./Images/Oden-Eating-Hot-Pot.webp" alt="Oden Eating Hot Pot">
                </div>
                <div class="text-card">
                    <p>"Oden wouldn’t be Oden, if it wasn’t boiled." – Kozuki Oden</p>
                </div>
            </div>
        </section>
        <section class="row2">
            <div class="delicious-in-dungeon-card">
                <img src="./Images/Delicious-In-Dungeon-Hot-Pot-Scene.webp" alt="Yummy Hot Pot" class="image-card">
                <div class="text-card">
                    <p>Walking muushrooms are easy to cook and they make great broth! - Senshi</p>
                </div>
            </div>
        </section>
    </section>
</body>
</html>
